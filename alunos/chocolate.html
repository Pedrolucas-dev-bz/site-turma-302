<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chocolate</title>
<link rel="stylesheet" href="../style.css">
<style>
  /* Faz o GIF ocupar a tela inteira */
  #explosao-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.2); /* leve sombra atrás se quiser */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }

  #explosao-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>
</head>

<body style="background:linear-gradient(180deg,#dcfce7,#4ade80); min-height:100vh;">

<h1>Chocolate 👷‍♂️🦺⚠️🍫</h1>

<!-- GIF de explosão fullscreen -->
<div id="explosao-container">
    <img src="../img/chocolate.gif" id="explosao">
</div>

<!-- Conteúdo real -->
<div id="conteudo-aluno" style="display:none;">
    <img src="../img/chocolate.jpeg" style="width:100%; max-width:400px; border-radius:12px;">

    <p>Música favorita 🎵</p>

    <div class="player">
        <button id="playBtn" onclick="togglePlay()">▶</button>

        <div class="progress-container" onclick="setProgress(event)">
            <div class="progress" id="progress"></div>
        </div>

        <audio id="player">
            <source src="../musicas/chocolate.mp3" type="audio/mpeg">
        </audio>
    </div>
</div>

<br><br>

<a href="../index.html">⬅ Voltar</a>

<script src="../script.js"></script>

<script>
    // Mostra o GIF fullscreen e depois o conteúdo real
    window.onload = () => {
        setTimeout(() => {
            document.getElementById("explosao-container").style.display = "none";
            document.getElementById("conteudo-aluno").style.display = "block";
        }, 2000); // Ajuste conforme a duração do GIF
    };
</script>

</body>
</html>
